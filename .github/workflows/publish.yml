name: Publish to PyPI

on:
  push:
    branches:
      - main

# Required for semantic-release to push tags and commits back to the repo
permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Semantic Release → PyPI
    runs-on: ubuntu-latest
    concurrency: release   # prevent concurrent releases

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history needed for semantic-release
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install all dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          # Explicitly install build tools in this same environment
          # (semantic-release calls 'python -m build' in the same shell)
          pip install build twine

      # ---------------------------------------------------------------
      # Run tests — block publish if tests fail
      # ---------------------------------------------------------------
      - name: Run tests
        run: pytest -v

      # ---------------------------------------------------------------
      # Semantic Release — bumps version, creates git tag, GitHub Release,
      # and runs `python -m build` (populates dist/).
      # No release is triggered if there are no feat/fix commits.
      # ---------------------------------------------------------------
      - name: Python Semantic Release
        run: semantic-release version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---------------------------------------------------------------
      # Upload to PyPI — only runs if dist/ was actually built above.
      # Uses twine directly so credentials are explicit and auditable.
      # ---------------------------------------------------------------
      - name: Publish to PyPI
        if: ${{ hashFiles('dist/*.whl') != '' }}
        run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
