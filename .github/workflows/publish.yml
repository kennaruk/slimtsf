name: Publish to PyPI

on:
  push:
    branches:
      - main

# Required for python-semantic-release to push tags and commits back to the repo
permissions:
  contents: write
  id-token: write   # needed for PyPI Trusted Publisher (if configured)

jobs:
  release:
    name: Semantic Release → PyPI
    runs-on: ubuntu-latest
    concurrency: release   # prevent concurrent releases

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history needed for semantic-release
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # ---------------------------------------------------------------
      # Run tests — block publish if tests fail
      # ---------------------------------------------------------------
      - name: Run tests
        run: pytest -v

      # ---------------------------------------------------------------
      # Semantic Release
      # Reads commits since last tag, decides version bump,
      # updates CHANGELOG.md, creates git tag + GitHub Release,
      # builds package, uploads to PyPI.
      # No release is created if there are no feat/fix commits.
      # ---------------------------------------------------------------
      - name: Python Semantic Release
        id: semantic-release
        uses: python-semantic-release/python-semantic-release@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
